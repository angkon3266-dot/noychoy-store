; Raise upload limits so large product images / videos and the CSV+ZIP
; importer don't get rejected with "413 Payload Too Large".
; LiteSpeed/PHP-FPM read this file per-directory (cached up to 5 minutes).
upload_max_filesize = 256M
post_max_size = 256M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_file_uploads = 100
